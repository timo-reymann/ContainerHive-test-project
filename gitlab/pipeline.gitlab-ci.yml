    name: ghcr.io/timo-reymann/containerhive:9c84943
    entrypoint: [""]
  script:
    - ch -p gitlab finalize ${IMAGE_NAME} --build-id "$SNAPSHOT_ID"

.test:
  image:
    name: ghcr.io/timo-reymann/containerhive:9c84943
    entrypoint: [""]
  stage: test
  services:
    - name: docker:dind
      alias: dind
  variables:
    DOCKER_HOST: tcp://dind:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - ch -p gitlab wait --docker-socket
    - ch -p gitlab test ${IMAGE_NAME} --build-id "$SNAPSHOT_ID"


      alias: buildkitd
      command: ["--addr", "tcp://0.0.0.0:8372"]
  variables:
    BUILDKIT_HOST: tcp://buildkitd:8372
  script:
    - ch -p gitlab wait --buildkitd
    - ch -p gitlab build ${IMAGE_NAME} --platform ${PLATFORM} --build-id "$SNAPSHOT_ID"
